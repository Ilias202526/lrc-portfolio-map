<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
:root{--navy:#172544;--blue:#16708e;--bg:#f4f7fb;--line:#dbe3ee;--muted:#68768a;--green:#3a7d55;--amber:#b0781c;--red:#b33a3a}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--navy);background:var(--bg)}
header{height:68px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 18px}
header h1{margin:0;font-size:21px}.toggle{display:flex;gap:7px}.toggle button{width:auto;padding:8px 11px;border:0;border-radius:7px;background:#fff;color:var(--navy);font-weight:700;cursor:pointer}.toggle button.active{background:#50b2d0;color:#fff}
.layout{height:calc(100% - 68px);display:grid;grid-template-columns:0 1fr}.layout.details{grid-template-columns:410px 1fr}
aside{display:none;background:#fff;border-right:1px solid var(--line);overflow:auto;padding:12px}.layout.details aside{display:block}
#map{width:100%;height:100%}.summary{background:#edf3fb;border-radius:9px;padding:10px;margin-bottom:8px;font-size:12px;line-height:1.45}
.controls{display:grid;grid-template-columns:1fr 120px;gap:6px;margin-bottom:7px}
.quick-regions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.quick-regions button{font-size:11px;padding:8px 6px;background:#172544;color:#fff;border:0;border-radius:7px;cursor:pointer}
.quick-regions button.secondary{background:#fff;color:#172544;border:1px solid #aebed0}
.quick-regions button.active{background:#50b2d0;color:#fff}
input,select,button{width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:7px;background:#fff}
.asset{padding:8px 6px;border-bottom:1px solid #edf1f6;cursor:pointer}.asset:hover{background:#f5f8fc}.asset strong{font-size:12px;display:block}.asset small{font-size:10px;color:var(--muted);line-height:1.35}

.legend{position:absolute;right:13px;bottom:14px;z-index:1000;background:#fff;padding:8px 10px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.2);font-size:10px}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px}
.popup{min-width:330px}.popup h3{margin:0 0 5px;font-size:14px}.popup-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:7px 0}.kpi{background:#f2f6fb;border-radius:5px;padding:6px}.kpi b{font-size:11px;display:block}.kpi span{font-size:8px;color:var(--muted)}
.popup a{display:inline-block;margin-top:7px;padding:6px 8px;border-radius:5px;text-decoration:none;background:var(--navy);color:#fff;font-size:10px}
@media(max-width:850px){header{height:62px}.layout,.layout.details{height:calc(100% - 62px);grid-template-columns:1fr;grid-template-rows:42vh 1fr}.layout.details aside{display:block}.layout.details #map{grid-row:2}}
.google-3d-control a{line-height:30px;text-decoration:none}.google-3d-control a:hover{background:#f0f3f7!important}
</style>
</head>

<header><h1>LRC Building Portfolio Map</h1><div class="toggle"><button id="detailsBtn" class="active">Details</button></div></header>
<div class="layout details" id="layout"><aside>
<div class="summary" id="summary"></div>
<div class="controls"><input id="search" placeholder="Search address or portfolio"><select id="town"><option value="">All towns</option></select></div>
<div class="quick-regions">

</div><div class="controls"><select id="countyFilter" multiple size="8" title="Hold Ctrl (Windows) or Cmd (Mac) to select multiple counties / locations"></select><div></div></div>
<div class="controls"><select id="portfolio" multiple size="8" title="Hold Ctrl (Windows) or Cmd (Mac) to select multiple portfolios"></select><select id="occupancy"><option value="">All occupancy</option><option value="occupied">Fully occupied</option><option value="mixed">Part occupied</option><option value="vacant">Fully vacant</option></select></div><div class="controls"><select id="coreFilter"><option value="">All core classifications</option><option value="Core">Core</option><option value="Non-Core">Non-Core</option><option value="Mixed">Mixed</option></select><div></div></div>
<div id="list"></div>
</aside><div id="map"></div></div>

 if(s==='core') return 'Core';
 return value||'';
}

 const selectedLocations=[...$('countyFilter').selectedOptions].map(e=>e.value).filter(Boolean);
 const hay=(x.address+' '+x.town+' '+x.county+' '+x.head_portfolio+' '+x.portfolio+' '+x.core).toLowerCase();
 const portfolioOk=selectedPortfolios.length===0||selectedPortfolios.includes(x.head_portfolio);
 const locationOk=selectedLocations.length===0||selectedLocations.includes(x.county);
 const coreOk=!c||normalizeCore(x.core)===c;
 return (!q||hay.includes(q)) &&
        (!t||x.town===t) &&
        locationOk &&
        portfolioOk &&
        coreOk &&
        (!o||state(x)===o);
}

const DUBLIN_REGION=['Dublin','Kildare','Meath','Wicklow','Louth'];
const CORK_REGION=['Cork','Kerry','Limerick','Tipperary','Waterford','Clare'];

function clearLocationSelection(){
 [...$('countyFilter').options].forEach(o=>o.selected=false);
}
function selectLocationGroup(group){
 clearLocationSelection();
 const wanted=new Set(group);
 [...$('countyFilter').options].forEach(o=>{o.selected=wanted.has(o.value)});
 render();
 updateRegionButtons(group);
}
function updateRegionButtons(group){
 const selected=[...$('countyFilter').selectedOptions].map(o=>o.value).sort();
 const same=(a,b)=>a.length===b.length&&a.every((v,i)=>v===b[i]);
 $('dublinRegionBtn').classList.toggle('active',same(selected,[...DUBLIN_REGION].sort()));
 $('corkRegionBtn').classList.toggle('active',same(selected,[...CORK_REGION].sort()));
 $('allRegionsBtn').classList.toggle('active',selected.length===0);
}
function render(){cluster.clearLayers();visible.clear();$('list').innerHTML='';let shown=0,units=0,occ=0,vac=0,rent=0,erv=0;data.forEach((x,i)=>{if(!match(x))return;shown++;units+=x.units;occ+=x.occupied;vac+=x.vacant;rent+=x.passing_rent;erv+=x.erv;visible.add(i);cluster.addLayer(markers.get(i));if($('layout').classList.contains('details')){const el=document.createElement('div');el.className='asset';el.innerHTML=`<strong>${esc(x.address)}</strong><small>${x.units} units · ${x.occupancy===null?'–':(100*x.occupancy).toFixed(1)+'%'} occupied · ${esc(x.head_portfolio)}<br>${euro(x.passing_rent)} PM</small>`;el.onclick=()=>cluster.zoomToShowLayer(markers.get(i),()=>markers.get(i).openPopup());$('list').appendChild(el)}});$('summary').innerHTML=`<b>${num(shown)} buildings · ${num(units)} units</b><br>Occupancy: <b>${occ+vac?(100*occ/(occ+vac)).toFixed(1)+'%':'–'}</b><br>Passing rent: <b>${euro(rent)}/month</b><br>2025 ERV: <b>${euro(erv)}/month</b>`}
function mode(){
$('layout').classList.add('details');
$('detailsBtn').classList.add('active');
render();
setTimeout(()=>map.invalidateSize(),200);
}
mode();['search','town','occupancy','coreFilter'].forEach(id=>$(id).addEventListener(id==='search'?'input':'change',render));$('countyFilter').addEventListener('change',()=>{render();updateRegionButtons([])});
$('dublinRegionBtn').onclick=()=>selectLocationGroup(DUBLIN_REGION);
$('corkRegionBtn').onclick=()=>selectLocationGroup(CORK_REGION);
$('allRegionsBtn').onclick=()=>{clearLocationSelection();render();updateRegionButtons([])};
[...new Set(data.map(x=>x.town))].sort().forEach(v=>$('town').add(new Option(v,v)));[...new Set(data.map(x=>x.county))].sort().forEach(v=>$('countyFilter').add(new Option(v,v)));[...new Set(data.map(x=>x.head_portfolio))].sort().forEach(v=>$('portfolio').add(new Option(v,v)));$('portfolio').addEventListener('change',render);
render();updateRegionButtons([]);setTimeout(()=>map.fitBounds(cluster.getBounds(),{padding:[20,20]}),300);
</script></body></html>
